<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Two-Way Control</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; max-width: 600px; margin: auto; }
        #terminal { 
            height: 250px; width: 100%; border: 1px solid #ccc; 
            background: #1e1e1e; color: #00ff00; padding: 10px;
            overflow-y: auto; font-family: monospace; white-space: pre-wrap;
            margin: 15px 0; border-radius: 8px;
        }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { 
            padding: 10px 20px; font-size: 14px; cursor: pointer;
            background: #007bff; color: white; border: none; border-radius: 4px;
        }
        button:disabled { background: #ccc; }
        #sendBtn { background: #28a745; }
    </style>
</head>
<body>
    <h2>Arduino Controller</h2>
    <button id="connectBtn">Connect to Arduino</button>
    
    <div id="terminal">Disconnected. Press Connect...</div>

    <div class="controls">
        <input type="text" id="commandInput" placeholder="Type 'ON' or 'OFF'..." disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>

    <script>
     let port, writer;
     const connectBtn = document.getElementById('connectBtn');
     const sendBtn = document.getElementById('sendBtn');
     const commandInput = document.getElementById('commandInput');
     const terminal = document.getElementById('terminal');

     // Connect Function
     connectBtn.addEventListener('click', async () => {
       try {
         port = await navigator.serial.requestPort();
         await port.open({ baudRate: 9600 });
         
         connectBtn.disabled = true;
         sendBtn.disabled = false;
         commandInput.disabled = false;
         terminal.innerText = "Connected! Listening for data...\n";

         // Setup Writing
         const encoder = new TextEncoderStream();
         encoder.readable.pipeTo(port.writable);
         writer = encoder.writable.getWriter();

         // Setup Reading
         const decoder = new TextDecoderStream();
         port.readable.pipeTo(decoder.writable);
         const reader = decoder.readable.getReader();

         while (true) {
           const { value, done } = await reader.read();
           if (done) break;
           if (value) {
             terminal.innerText += value;
             terminal.scrollTop = terminal.scrollHeight;
           }
         }
       } catch (err) {
         terminal.innerText += `\nError: ${err.message}`;
       }
     });

     // Send Function
     sendBtn.addEventListener('click', async () => {
       const data = commandInput.value;
       if (data && writer) {
         await writer.write(data + "\n"); // Add newline so Arduino knows it's the end
         terminal.innerText += `\n> Sent: ${data}\n`;
         commandInput.value = "";
       }
     });
    </script>
</body>
</html>
